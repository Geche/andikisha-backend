---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: api-gateway

---
# Auth Service (ClusterIP for internal gRPC)
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: ClusterIP
  ports:
  - port: 5002
    targetPort: 5002
    protocol: TCP
    name: grpc
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: auth-service

---
# Employee Service (ClusterIP for internal gRPC)
apiVersion: v1
kind: Service
metadata:
  name: employee-service
spec:
  type: ClusterIP
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: grpc
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: employee-service

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: redis

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 2
          failureThreshold: 3

---
# Horizontal Pod Autoscaler for API Gateway
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Health Aggregator Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-aggregator
  labels:
    app: health-aggregator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-aggregator
  template:
    metadata:
      labels:
        app: health-aggregator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3010"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: health-aggregator
        image: andikisha/health-aggregator:latest
        ports:
        - containerPort: 3010
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3010"
        - name: HEALTH_POLL_INTERVAL
          value: "10000"  # 10 seconds
        - name: HEALTH_CHECK_TIMEOUT
          value: "5000"   # 5 seconds
        - name: STORAGE_TYPE
          value: "memory"
        - name: API_GATEWAY_URL
          value: "http://api-gateway:3000"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:3002"
        - name: EMPLOYEE_SERVICE_URL
          value: "http://employee-service:3001"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        # Liveness probe - checks if container should be restarted
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3010
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        # Readiness probe - checks if container should receive traffic
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3010
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# Health Aggregator Service
apiVersion: v1
kind: Service
metadata:
  name: health-aggregator
  labels:
    app: health-aggregator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3010"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: health-aggregator
  ports:
  - name: http
    port: 3010
    targetPort: 3010
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 3010
    protocol: TCP

---
# Health Aggregator Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: health-aggregator-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: health-aggregator
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
